<!DOCTYPE html>
<html>
<head>
<title>SMART GRID FAULT MONITOR</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
margin:0;
padding:0;
}

h1{
margin-top:20px;
font-size:40px;
letter-spacing:2px;
}

.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
margin-top:30px;
}

.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
padding:20px;
border-radius:15px;
width:200px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.value{
font-size:32px;
margin-top:10px;
font-weight:bold;
}

.status{
font-size:22px;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.normal{
background:#27ae60;
}

.fault{
background:#e74c3c;
}

/* GRAPH AREA */
.graphs{
width:80%;
margin:auto;
margin-top:30px;
}

/* SMALLER GRAPHS */
canvas{
background:white;
border-radius:10px;
padding:10px;
margin-bottom:25px;
width:500px !important;
height:250px !important;
display:block;
margin-left:auto;
margin-right:auto;
}

</style>
</head>

<body>

<h1>⚡ SMART GRID MONITORING DASHBOARD</h1>

<div class="container">

<div class="card">
<h3>Voltage</h3>
<div class="value" id="voltage">--</div>
</div>

<div class="card">
<h3>Current</h3>
<div class="value" id="current">--</div>
</div>

<div class="card">
<h3>Frequency</h3>
<div class="value" id="frequency">--</div>
</div>

<div class="card">
<h3>Status</h3>
<div class="status" id="status">--</div>
</div>

</div>

<div class="graphs">

<h2>Voltage Graph</h2>
<canvas id="voltageChart"></canvas>

<h2>Current Graph</h2>
<canvas id="currentChart"></canvas>

<h2>Frequency Graph</h2>
<canvas id="frequencyChart"></canvas>

</div>

<script>

const CHANNEL_ID = "565129";

const voltageChart = new Chart(
document.getElementById('voltageChart'),
{
type:'line',
data:{labels:[],datasets:[{label:'Voltage',data:[],borderWidth:3}]},
options:{responsive:true}
});

const currentChart = new Chart(
document.getElementById('currentChart'),
{
type:'line',
data:{labels:[],datasets:[{label:'Current',data:[],borderWidth:3}]},
options:{responsive:true}
});

const frequencyChart = new Chart(
document.getElementById('frequencyChart'),
{
type:'line',
data:{labels:[],datasets:[{label:'Frequency',data:[],borderWidth:3}]},
options:{responsive:true}
});


async function loadData(){

let url=`https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds.json?results=10`;

let response = await fetch(url);
let data = await response.json();

let feeds=data.feeds;

let labels=[];
let voltage=[];
let current=[];
let frequency=[];
let status="";

feeds.forEach(f=>{

labels.push(new Date(f.created_at).toLocaleTimeString());

voltage.push(f.field1);
current.push(f.field2);
frequency.push(f.field3);
status=f.field4;

});

document.getElementById("voltage").innerHTML = voltage[voltage.length-1]+" V";
document.getElementById("current").innerHTML = current[current.length-1]+" mA";
document.getElementById("frequency").innerHTML = frequency[frequency.length-1]+" Hz";

let statusBox=document.getElementById("status");
statusBox.innerHTML=status;

if(status=="NORMAL")
statusBox.className="status normal";
else
statusBox.className="status fault";

voltageChart.data.labels=labels;
voltageChart.data.datasets[0].data=voltage;
voltageChart.update();

currentChart.data.labels=labels;
currentChart.data.datasets[0].data=current;
currentChart.update();

frequencyChart.data.labels=labels;
frequencyChart.data.datasets[0].data=frequency;
frequencyChart.update();

}

loadData();
setInterval(loadData,5000);

</script>

</body>
</html>
