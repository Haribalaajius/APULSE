<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGrid - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1a202c 50%, #2d3748 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
            border: 1px solid #374151;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-icon {
            font-size: 48px;
            color: #60a5fa;
            margin-bottom: 15px;
        }

        .login-header h1 {
            color: #e2e8f0;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .login-header p {
            color: #cbd5e0;
            font-size: 14px;
        }

        .form-floating > label {
            color: #cbd5e0;
        }

        .form-floating > .form-control {
            background: rgba(96, 165, 250, 0.05);
            border: 1px solid #374151;
            color: #e2e8f0;
            padding: 15px 12px;
        }

        .form-floating > .form-control:focus {
            background: rgba(96, 165, 250, 0.1);
            border-color: #60a5fa;
            color: #e2e8f0;
            box-shadow: none;
        }

        .form-floating > .form-control::placeholder {
            color: #6b7280;
        }

        .login-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            padding: 12px;
            font-weight: 600;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
        }

        .alert {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #fecaca;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .demo-credentials {
            background: rgba(96, 165, 250, 0.1);
            border: 1px solid #60a5fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 25px;
            font-size: 13px;
            color: #cbd5e0;
        }

        .demo-credentials h6 {
            color: #60a5fa;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .credential-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid rgba(96, 165, 250, 0.2);
        }

        .credential-item:last-child {
            border-bottom: none;
        }

        .credential-label {
            color: #9ca3af;
        }

        .credential-value {
            color: #60a5fa;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon"><i class="fas fa-bolt"></i></div>
                <h1>SmartGrid</h1>
                <p>Professional Grid Monitoring Dashboard</p>
            </div>

            {% if error %}
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                {{ error }}
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
            </div>
            {% endif %}

            <form method="POST">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="username" name="username" placeholder="Username" required>
                    <label for="username"><i class="fas fa-user"></i> Username</label>
                </div>

                <div class="form-floating mb-2">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                </div>

                <button type="submit" class="btn btn-primary login-btn w-100">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <div class="demo-credentials">
                <h6><i class="fas fa-info-circle"></i> Demo Credentials</h6>
                <div class="credential-item">
                    <span class="credential-label">Admin:</span>
                    <span class="credential-value">admin / admin123</span>
                </div>
                <div class="credential-item">
                    <span class="credential-label">User:</span>
                    <span class="credential-value">user / user123</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
