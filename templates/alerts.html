<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts - SmartGrid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI'; }
        .sidebar { background: linear-gradient(135deg, #1a202c, #2d3748); min-height: 100vh; position: fixed; left: 0; top: 0; width: 260px; padding-top: 20px; z-index: 1000; border-right: 1px solid #4a5568; }
        .sidebar-brand { padding: 20px; text-align: center; border-bottom: 1px solid #4a5568; margin-bottom: 20px; }
        .sidebar-brand h4 { color: #60a5fa; font-weight: 700; }
        .nav-link { color: #cbd5e0; padding: 12px 15px; margin: 8px 10px; border-radius: 8px; transition: all 0.3s; }
        .nav-link:hover { background: rgba(96, 165, 250, 0.1); color: #60a5fa; }
        .nav-link.active { background: rgba(96, 165, 250, 0.2); color: #60a5fa; border-left: 3px solid #60a5fa; }
        .main-content { margin-left: 260px; padding: 30px; }
        .top-navbar { background: linear-gradient(135deg, #1a202c, #2d3748); border-bottom: 1px solid #4a5568; padding: 15px 30px; margin: -30px -30px 30px -30px; margin-left: calc(-30px + 260px); }
        .top-navbar h2 { color: #60a5fa; font-weight: 700; }
        .alert-item { background: linear-gradient(135deg, #1f2937, #111827); border-left: 4px solid; border-radius: 8px; padding: 20px; margin-bottom: 15px; display: flex; gap: 15px; align-items: center; }
        .alert-critical { border-left-color: #ef4444; }
        .alert-warning { border-left-color: #f59e0b; }
        .alert-info { border-left-color: #3b82f6; }
        .alert-icon { font-size: 32px; min-width: 40px; }
        .alert-content { flex: 1; }
        .alert-timestamp { color: #9ca3af; font-size: 12px; }
        .badge-status { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .status-resolved { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .status-active { background: rgba(239, 68, 68, 0.2); color: #ef4444; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .filter-btn { background: rgba(96, 165, 250, 0.1); color: #60a5fa; border: 1px solid #60a5fa; padding: 8px 16px; border-radius: 6px; margin-right: 10px; cursor: pointer; transition: all 0.3s; }
        .filter-btn:hover, .filter-btn.active { background: rgba(96, 165, 250, 0.2); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand"><h4><i class="fas fa-bolt"></i> SmartGrid</h4></div>
    <nav>
        <a class="nav-link" href="/"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a class="nav-link" href="/analytics"><i class="fas fa-bar-chart"></i> Analytics</a>
        <a class="nav-link" href="/models"><i class="fas fa-brain"></i> Models</a>
        <a class="nav-link active" href="/alerts"><i class="fas fa-bell"></i> Alerts</a>
        <a class="nav-link" href="/settings"><i class="fas fa-cog"></i> Settings</a>
        <a class="nav-link" href="/admin"><i class="fas fa-lock"></i> Admin</a>
        <a class="nav-link" href="/export"><i class="fas fa-download"></i> Export</a>
        <hr style="border-color: #4a5568; margin: 20px 0;">
        <a class="nav-link" href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
</div>

<div class="main-content">
    <div class="top-navbar">
        <h2><i class="fas fa-bell"></i> System Alerts</h2>
    </div>

    <!-- Statistics -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div style="background: linear-gradient(135deg, #1f2937, #111827); border: 1px solid #374151; border-radius: 12px; padding: 20px; text-align: center;">
                <div style="font-size: 32px; font-weight: 700; color: #ef4444;" id="criticalCount">0</div>
                <div style="color: #9ca3af; margin-top: 5px;">Critical Alerts</div>
            </div>
        </div>
        <div class="col-md-3">
            <div style="background: linear-gradient(135deg, #1f2937, #111827); border: 1px solid #374151; border-radius: 12px; padding: 20px; text-align: center;">
                <div style="font-size: 32px; font-weight: 700; color: #f59e0b;" id="warningCount">0</div>
                <div style="color: #9ca3af; margin-top: 5px;">Warnings</div>
            </div>
        </div>
        <div class="col-md-3">
            <div style="background: linear-gradient(135deg, #1f2937, #111827); border: 1px solid #374151; border-radius: 12px; padding: 20px; text-align: center;">
                <div style="font-size: 32px; font-weight: 700; color: #3b82f6;" id="infoCount">0</div>
                <div style="color: #9ca3af; margin-top: 5px;">Notifications</div>
            </div>
        </div>
        <div class="col-md-3">
            <div style="background: linear-gradient(135deg, #1f2937, #111827); border: 1px solid #374151; border-radius: 12px; padding: 20px; text-align: center;">
                <div style="font-size: 32px; font-weight: 700; color: #22c55e;" id="resolvedCount">0</div>
                <div style="color: #9ca3af; margin-top: 5px;">Resolved</div>
            </div>
        </div>
    </div>

    <!-- Filters -->
    <div style="margin-bottom: 20px;">
        <button class="filter-btn active" onclick="filterAlerts('all')">All</button>
        <button class="filter-btn" onclick="filterAlerts('critical')"><i class="fas fa-exclamation-circle"></i> Critical</button>
        <button class="filter-btn" onclick="filterAlerts('warning')"><i class="fas fa-exclamation-triangle"></i> Warning</button>
        <button class="filter-btn" onclick="filterAlerts('info')"><i class="fas fa-info-circle"></i> Info</button>
    </div>

    <!-- Alerts List -->
    <div id="alertsList">
        <div style="text-align: center; color: #9ca3af; padding: 40px;">
            <i class="fas fa-inbox" style="font-size: 48px; margin-bottom: 20px; display: block;"></i>
            No alerts at the moment
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentFilter = 'all';
    let allAlerts = [];

    const alertTemplates = {
        'SHORT_CIRCUIT_FAULT': {
            type: 'critical',
            icon: 'fa-exclamation-circle',
            color: '#ef4444',
            title: 'Short Circuit Detected',
            description: 'A short circuit fault has been detected. Immediate action required!'
        },
        'HIGH_VOLTAGE_FAULT': {
            type: 'critical',
            icon: 'fa-lightning-bolt',
            color: '#ef4444',
            title: 'High Voltage Detected',
            description: 'Voltage exceeds safe limits. Check transformer settings.'
        },
        'OPEN_VOLTAGE_FAULT': {
            type: 'warning',
            icon: 'fa-exclamation-triangle',
            color: '#f59e0b',
            title: 'Open Circuit Detected',
            description: 'A loose connection or open circuit detected.'
        },
        'FREQUENCY_FAULT': {
            type: 'warning',
            icon: 'fa-wave-square',
            color: '#f59e0b',
            title: 'Frequency Unstable',
            description: 'Generator frequency is unstable.'
        },
        'NORMAL': {
            type: 'info',
            icon: 'fa-check-circle',
            color: '#22c55e',
            title: 'System Normal',
            description: 'System operating within safe parameters.'
        }
    };

    async function loadAlerts() {
        try {
            const res = await fetch('/api/alerts');
            const data = await res.json();
            allAlerts = data.alerts || [];
            renderAlerts();
            updateCounts();
        } catch (e) { console.warn('Load alerts error:', e); }
    }

    function filterAlerts(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        renderAlerts();
    }

    function renderAlerts() {
        const filtered = currentFilter === 'all' ? allAlerts : allAlerts.filter(a => a.type === currentFilter);
        const container = document.getElementById('alertsList');
        
        if (filtered.length === 0) {
            container.innerHTML = '<div style="text-align: center; color: #9ca3af; padding: 40px;"><i class="fas fa-inbox" style="font-size: 48px; margin-bottom: 20px; display: block;"></i>No alerts</div>';
            return;
        }

        container.innerHTML = filtered.map(alert => `
            <div class="alert-item alert-${alert.type}">
                <div class="alert-icon" style="color: ${alert.color};"><i class="fas ${alert.icon}"></i></div>
                <div class="alert-content">
                    <div style="font-weight: 700; color: #e2e8f0; margin-bottom: 5px;">${alert.title}</div>
                    <div style="color: #cbd5e0; font-size: 14px;">${alert.description}</div>
                    <div class="alert-timestamp">${new Date(alert.timestamp).toLocaleString()}</div>
                </div>
                <div style="text-align: right;">
                    <span class="badge-status ${alert.resolved ? 'status-resolved' : 'status-active'}">
                        ${alert.resolved ? '<i class="fas fa-check"></i> Resolved' : '<i class="fas fa-circle"></i> Active'}
                    </span>
                </div>
            </div>
        `).join('');
    }

    function updateCounts() {
        const counts = {
            critical: allAlerts.filter(a => a.type === 'critical' && !a.resolved).length,
            warning: allAlerts.filter(a => a.type === 'warning' && !a.resolved).length,
            info: allAlerts.filter(a => a.type === 'info').length,
            resolved: allAlerts.filter(a => a.resolved).length
        };
        document.getElementById('criticalCount').textContent = counts.critical;
        document.getElementById('warningCount').textContent = counts.warning;
        document.getElementById('infoCount').textContent = counts.info;
        document.getElementById('resolvedCount').textContent = counts.resolved;
    }

    loadAlerts();
    setInterval(loadAlerts, 10000);
</script>

</body>
</html>
