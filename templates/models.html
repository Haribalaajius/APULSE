<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Models - SmartGrid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.45.0/dist/apexcharts.min.js"></script>
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI'; }
        .sidebar { background: linear-gradient(135deg, #1a202c, #2d3748); min-height: 100vh; position: fixed; left: 0; top: 0; width: 260px; padding-top: 20px; z-index: 1000; border-right: 1px solid #4a5568; }
        .sidebar-brand { padding: 20px; text-align: center; border-bottom: 1px solid #4a5568; margin-bottom: 20px; }
        .sidebar-brand h4 { color: #60a5fa; font-weight: 700; }
        .nav-link { color: #cbd5e0; padding: 12px 15px; margin: 8px 10px; border-radius: 8px; transition: all 0.3s; }
        .nav-link:hover { background: rgba(96, 165, 250, 0.1); color: #60a5fa; }
        .nav-link.active { background: rgba(96, 165, 250, 0.2); color: #60a5fa; border-left: 3px solid #60a5fa; }
        .main-content { margin-left: 260px; padding: 30px; }
        .top-navbar { background: linear-gradient(135deg, #1a202c, #2d3748); border-bottom: 1px solid #4a5568; padding: 15px 30px; margin: -30px -30px 30px -30px; margin-left: calc(-30px + 260px); }
        .top-navbar h2 { color: #60a5fa; font-weight: 700; }
        .model-card { background: linear-gradient(135deg, #1f2937, #111827); border: 1px solid #374151; border-radius: 12px; padding: 25px; margin-bottom: 20px; transition: all 0.3s; }
        .model-card:hover { transform: translateY(-5px); border-color: #60a5fa; box-shadow: 0 10px 30px rgba(96, 165, 250, 0.2); }
        .model-name { font-size: 20px; font-weight: 700; color: #60a5fa; margin-bottom: 10px; }
        .accuracy-bar { background: #374151; border-radius: 8px; height: 30px; overflow: hidden; }
        .accuracy-fill { background: linear-gradient(90deg, #22c55e, #fbbf24); height: 100%; display: flex; align-items: center; justify-content: flex-end; padding-right: 10px; font-weight: 700; color: white; }
        .badge-best { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid #22c55e; padding: 8px 16px; border-radius: 8px; font-weight: 600; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand"><h4><i class="fas fa-bolt"></i> SmartGrid</h4></div>
    <nav>
        <a class="nav-link" href="/"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a class="nav-link" href="/analytics"><i class="fas fa-bar-chart"></i> Analytics</a>
        <a class="nav-link active" href="/models"><i class="fas fa-brain"></i> Models</a>
        <a class="nav-link" href="/alerts"><i class="fas fa-bell"></i> Alerts</a>
        <a class="nav-link" href="/settings"><i class="fas fa-cog"></i> Settings</a>
        <a class="nav-link" href="/admin"><i class="fas fa-lock"></i> Admin</a>
        <a class="nav-link" href="/export"><i class="fas fa-download"></i> Export</a>
        <hr style="border-color: #4a5568; margin: 20px 0;">
        <a class="nav-link" href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
</div>

<div class="main-content">
    <div class="top-navbar">
        <h2><i class="fas fa-brain"></i> Machine Learning Models</h2>
    </div>

    <div class="row mb-4">
        <div class="col-lg-12">
            <div style="background: linear-gradient(135deg, #1f2937, #111827); border: 1px solid #374151; border-radius: 12px; padding: 25px; margin-bottom: 30px;">
                <h5 style="color: #e2e8f0; margin-bottom: 20px;"><i class="fas fa-star"></i> Best Model</h5>
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <div>
                        <div style="font-size: 32px; font-weight: 700; color: #60a5fa;" id="bestModelName">{{ best_model }}</div>
                        <div style="color: #9ca3af; margin-top: 5px;">Selected as the best performing model</div>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-size: 48px; font-weight: 700; color: #22c55e;" id="bestAccuracy">{{ (best_accuracy*100)|round(2) }}%</div>
                        <span class="badge-best"><i class="fas fa-crown"></i> Champion</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-12">
            <h4 style="margin-bottom: 20px; color: #e2e8f0;"><i class="fas fa-list"></i> All Models Performance</h4>
            <div id="modelsContainer"></div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-lg-12">
            <div style="background: linear-gradient(135deg, #1f2937, #111827); border: 1px solid #374151; border-radius: 12px; padding: 25px;">
                <h5 style="color: #e2e8f0; margin-bottom: 20px;"><i class="fas fa-chart-bar"></i> Accuracy Comparison</h5>
                <div id="comparisonChart"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Helper function to escape HTML (must be defined before use)
function escapeHtmlContent(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Wait for DOM to be ready
document.addEventListener('DOMContentLoaded', function() {
    try {
        // Get the models data - safely parse the template variable
        let models = {};
        try {
            const rawData = {{ all_accuracies | tojson }};
            if (rawData && typeof rawData === 'object') {
                models = rawData;
            }
        } catch (parseErr) {
            console.error('Error parsing models data:', parseErr);
        }

        // Display all models in cards
        const container = document.getElementById('modelsContainer');
        if (container) {
            if (Object.keys(models).length > 0) {
                container.innerHTML = '';
                
                for (const [name, accuracy] of Object.entries(models)) {
                    try {
                        const accNum = Number(accuracy);
                        if (isNaN(accNum)) {
                            console.warn('Invalid accuracy for model:', name, accuracy);
                            continue;
                        }

                        const isActive = (name === '{{ best_model }}');
                        const accPercent = accNum * 100;
                        
                        const card = document.createElement('div');
                        card.className = 'model-card';
                        card.innerHTML = `
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                                <div class="model-name">${escapeHtmlContent(name)}</div>
                                <span class="badge-best" style="${isActive ? 'background: rgba(34, 197, 94, 0.3); color: #22c55e;' : 'background: transparent; color: #9ca3af; border: none;'}">
                                    ${isActive ? '<i class="fas fa-check-circle"></i> Active' : 'Trained Model'}
                                </span>
                            </div>
                            <div class="accuracy-bar">
                                <div class="accuracy-fill" style="width: ${accPercent}%">${accPercent.toFixed(1)}%</div>
                            </div>
                            <div style="margin-top: 10px; color: #cbd5e0; font-size: 14px;">
                                <i class="fas fa-check-circle" style="color: #22c55e;"></i> Accuracy: <strong>${accPercent.toFixed(2)}%</strong>
                            </div>
                        `;
                        container.appendChild(card);
                    } catch (cardErr) {
                        console.error('Error creating card for model', name, ':', cardErr);
                    }
                }
            } else {
                container.innerHTML = '<div style="color: #cbd5e0; text-align: center; padding: 30px;">No model data available</div>';
            }
        }

        // Create comparison chart
        const chartDiv = document.getElementById('comparisonChart');
        if (chartDiv && typeof ApexCharts !== 'undefined') {
            if (Object.keys(models).length > 0) {
                try {
                    const labels = [];
                    const data = [];
                    
                    for (const [name, accuracy] of Object.entries(models)) {
                        labels.push(escapeHtmlContent(name));
                        const accNum = Number(accuracy);
                        data.push(isNaN(accNum) ? 0 : accNum * 100);
                    }

                    const options = {
                        series: [{
                            name: 'Accuracy (%)',
                            data: data
                        }],
                        chart: {
                            type: 'bar',
                            height: 400,
                            background: 'transparent',
                            toolbar: { show: false }
                        },
                        colors: ['#60a5fa'],
                        plotOptions: {
                            bar: {
                                horizontal: false,
                                columnWidth: '60%',
                                borderRadius: 4
                            }
                        },
                        dataLabels: {
                            enabled: false
                        },
                        stroke: {
                            show: false
                        },
                        xaxis: {
                            categories: labels,
                            title: { text: 'Models' },
                            labels: { style: { colors: '#cbd5e0' } }
                        },
                        yaxis: {
                            min: 0,
                            max: 100,
                            title: { text: 'Accuracy (%)' },
                            labels: { style: { colors: '#cbd5e0' } }
                        },
                        grid: {
                            borderColor: '#374151'
                        },
                        tooltip: {
                            theme: 'dark',
                            y: {
                                formatter: function(val) {
                                    return val.toFixed(2) + '%';
                                }
                            }
                        },
                        theme: { mode: 'dark' }
                    };

                    const chart = new ApexCharts(chartDiv, options);
                    chart.render();
                } catch (chartErr) {
                    console.error('Error rendering chart:', chartErr);
                    chartDiv.innerHTML = '<div style="color: #ef4444; padding: 20px; text-align: center;">Failed to render chart</div>';
                }
            } else {
                chartDiv.innerHTML = '<div style="color: #cbd5e0; padding: 20px; text-align: center;">No data to display</div>';
            }
        } else if (!chartDiv) {
            console.error('Chart container not found');
        } else if (typeof ApexCharts === 'undefined') {
            console.error('ApexCharts library not loaded');
        }
    } catch (error) {
        console.error('Fatal error in script:', error);
    }
});
</script>

</body>
</html>
